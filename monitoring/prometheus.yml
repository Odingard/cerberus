global:
  scrape_interval: 10s
  evaluation_interval: 10s
  external_labels:
    monitor: cerberus

scrape_configs:
  # Cerberus metrics via OTel Collector Prometheus exporter
  - job_name: cerberus
    static_configs:
      - targets: ['otel-collector:8889']
    metric_relabel_configs:
      # Keep only cerberus_* metrics from the collector
      - source_labels: [__name__]
        regex: 'cerberus_.*'
        action: keep

  # OTel Collector self-metrics (optional — useful for debugging)
  - job_name: otel-collector
    static_configs:
      - targets: ['otel-collector:8888']
