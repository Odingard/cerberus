<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout Cancelled — Cerberus Enterprise</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0c10; --surface: #0f1117; --border: #1e2230;
      --blue: #4299e1; --muted: #6b7280;
      --text: #e2e8f0; --text-dim: #94a3b8;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 16px; line-height: 1.6; -webkit-font-smoothing: antialiased;
      min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 2rem;
    }
    a { color: var(--blue); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .card {
      max-width: 480px; width: 100%;
      background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
      padding: 3rem 2.5rem; text-align: center;
    }

    .icon {
      width: 64px; height: 64px; border-radius: 50%;
      background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.5rem; font-size: 1.75rem;
    }

    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: .75rem; }
    .subtitle { color: var(--text-dim); margin-bottom: 2rem; font-size: 0.9rem; line-height: 1.6; }

    .actions { display: flex; flex-direction: column; gap: .75rem; }
    .btn {
      display: inline-block; padding: .75rem 1.5rem;
      border-radius: 8px; font-size: 0.9rem; font-weight: 600;
      border: none; cursor: pointer; text-align: center; text-decoration: none;
      transition: opacity .15s, transform .1s;
    }
    .btn:hover { opacity: .88; transform: translateY(-1px); text-decoration: none; }
    .btn-primary { background: var(--blue); color: #fff; }
    .btn-outline { background: transparent; color: var(--blue); border: 1px solid rgba(66,153,225,0.4); }

    .note { margin-top: 1.5rem; font-size: 0.8rem; color: var(--muted); }
  </style>
</head>
<body>

<div class="card">
  <div class="icon">←</div>
  <h1>No charge was made</h1>
  <p class="subtitle">You cancelled before completing checkout. Your card was not charged.<br><br>Want to ask a question first? We're happy to help before you commit.</p>

  <div class="actions">
    <a href="pricing.html" class="btn btn-primary">Back to Pricing →</a>
    <a href="mailto:enterprise@sixsenseenterprise.com" class="btn btn-outline">Talk to Us First</a>
  </div>

  <p class="note">
    Or <a href="https://demo.cerberus.sixsenseenterprise.com" target="_blank">try the live demo</a> — no signup required.
  </p>
</div>

</body>
</html>
