name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write   # for cosign OIDC signing

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Extract version tag
        id: meta
        run: echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build and push demo image
        id: demo-build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: playground/Dockerfile
          push: true
          tags: |
            ghcr.io/odingard/cerberus-demo:latest
            ghcr.io/odingard/cerberus-demo:${{ steps.meta.outputs.tag }}

      - name: Sign demo image
        run: |
          cosign sign --yes \
            ghcr.io/odingard/cerberus-demo@${{ steps.demo-build.outputs.digest }}

      - name: Build and push gateway image
        id: gateway-build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: enterprise/gateway/Dockerfile
          push: true
          tags: |
            ghcr.io/odingard/cerberus-gateway:latest
            ghcr.io/odingard/cerberus-gateway:${{ steps.meta.outputs.tag }}

      - name: Sign gateway image
        run: |
          cosign sign --yes \
            ghcr.io/odingard/cerberus-gateway@${{ steps.gateway-build.outputs.digest }}

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/odingard/cerberus-gateway:${{ steps.meta.outputs.tag }}
          artifact-name: cerberus-gateway-${{ steps.meta.outputs.tag }}-sbom.spdx.json
          output-file: cerberus-gateway-sbom.spdx.json

      - name: Attach SBOM to release
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ steps.meta.outputs.tag }}
          path: cerberus-gateway-sbom.spdx.json
